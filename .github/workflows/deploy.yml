name: Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw verify --batch-mode

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mycqrs:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/mycqrs:latest

      - name: Trigger Render deploy
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Smoke test
        run: |
          set -e
          echo "Waiting for deploy to settle..."
          sleep 30
          for i in {1..20}; do
            if curl -fsS --max-time 10 "${{ secrets.RENDER_APP_URL }}/actuator/health" | grep -q '"status":"UP"'; then
              echo "Health check passed on attempt $i."
              exit 0
            fi
            echo "Attempt $i: not ready yet, waiting 15s..."
            sleep 15
          done
          echo "Smoke test failed: /actuator/health did not report UP within the window."
          exit 1
