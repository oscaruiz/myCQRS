name: Publish integration artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      # Publishes mycqrs-core, mycqrs-spring and mycqrs-micronaut. No -am: the three
      # modules declare each other as dependencies so the reactor builds them in the
      # right order on its own. Adding -am would drag the demos into deploy too.
      - name: Publish integration artifacts to GitHub Packages
        run: ./mvnw -pl src/core,src/core-spring,src/core-micronaut deploy -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
