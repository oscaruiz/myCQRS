spring:
  datasource:
    url: jdbc:h2:mem:mycqrsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true

  h2:
    console:
      enabled: false

  flyway:
    enabled: false

mycqrs:
  outbox:
    poll-interval: 60000
