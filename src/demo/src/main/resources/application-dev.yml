spring:
  data:
    mongodb:
      host: localhost
      port: 27017
      database: mycqrs_read
  datasource:
    url: jdbc:postgresql://localhost:5432/mycqrsdb
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

mycqrs:
  outbox:
    poll-interval: 1000
